name: release

# Push в main -> semantic-release анализирует conventional commits и, если есть
# что релизить, штампует ОДНУ версию (из git-тегов вида 0.1.5, без префикса v) в
# package.json и manifest.json, обновляет CHANGELOG.md, публикует пакет в npm
# (`npx obsidian-zen`) и создаёт GitHub Release с main.js/manifest.json/styles.css
# (его тянет BRAT). Версия в npm, GitHub Release, package.json и manifest.json
# всегда совпадает.
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: Igor Suvorov
          GIT_AUTHOR_EMAIL: hi@isuvorov.com
          GIT_COMMITTER_NAME: Igor Suvorov
          GIT_COMMITTER_EMAIL: hi@isuvorov.com
        run: npx semantic-release
